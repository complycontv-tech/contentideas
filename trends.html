<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trendy — Launchpad 🇸🇰</title>
  <style>
    :root { --primary: #1A56DB; --accent: #10B981; --dark: #111827; --gray: #6B7280; --light: #F3F4F6; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, Inter, sans-serif; background: #FAFAFA; color: var(--dark); }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    
    header { background: linear-gradient(135deg, var(--dark), #1E3A5F); color: white; padding: 40px 0; text-align: center; }
    header h1 { font-size: 32px; font-weight: 800; }
    header p { color: #9CA3AF; margin-top: 8px; }
    header .badge { display: inline-block; background: #EF4444; color: white; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 12px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    
    .nav-links { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
    .nav-links a { color: var(--primary); text-decoration: none; font-weight: 600; padding: 8px 20px; border-radius: 8px; border: 2px solid var(--primary); }
    .nav-links a:hover { background: var(--primary); color: white; }
    
    .filters { display: flex; gap: 10px; margin: 24px 0; flex-wrap: wrap; }
    .filter-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #E5E7EB; background: white; cursor: pointer; font-weight: 600; font-size: 14px; }
    .filter-btn:hover { border-color: var(--primary); }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    .trends-grid { display: grid; gap: 20px; }
    .trend-card { background: white; border-radius: 12px; padding: 24px; border: 1px solid #E5E7EB; position: relative; overflow: hidden; }
    .trend-card::before { content: '🔥'; position: absolute; top: 12px; right: 16px; font-size: 24px; }
    
    .trend-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tag { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
    .tag-marketing { background: #DBEAFE; color: #1E40AF; }
    .tag-gastro { background: #FEF3C7; color: #92400E; }
    .tag-brand { background: #EDE9FE; color: #6D28D9; }
    .tag-hot { background: #FEE2E2; color: #991B1B; }
    .tag-platform { background: #F3F4F6; color: #374151; }
    
    .trend-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .trend-desc { color: var(--gray); margin-bottom: 12px; line-height: 1.6; }
    .trend-insight { background: #EFF6FF; padding: 16px; border-radius: 8px; border-left: 4px solid var(--primary); margin: 12px 0; }
    .trend-insight strong { color: var(--primary); }
    .trend-source { font-size: 13px; color: var(--gray); margin-top: 8px; }
    
    #count { color: var(--gray); font-size: 14px; margin-bottom: 16px; }
    
    footer { text-align: center; padding: 40px 0; color: var(--gray); font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>🔥 Aktuálne trendy na Slovensku</h1>
      <p>Marketing • Gastro • Osobný brand — sledované denne</p>
      <span class="badge">Živé trendy</span>
    </div>
  </header>

  <div class="container">
    <div class="nav-links">
      <a href="index.html">📱 Nápady</a>
      <a href="trends.html" style="background: var(--primary); color: white;">🔥 Trendy</a>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Všetky trendy</button>
      <button class="filter-btn" data-filter="Marketing">📊 Marketing</button>
      <button class="filter-btn" data-filter="Gastro">🍽️ Gastro</button>
      <button class="filter-btn" data-filter="Personal Brand">🧑‍🎤 Osobný brand</button>
    </div>

    <div id="count"></div>
    <div class="trends-grid" id="trends-grid"></div>
  </div>

  <footer>
    <p>Launchpad Marketing 🇸🇰 — Trendy sledované a aktualizované denne</p>
  </footer>

  <script>
    let currentFilter = 'all';
    let trends = [];

    fetch('trends/trends.json')
      .then(r => r.json())
      .then(data => { trends = data; render(); })
      .catch(() => {
        document.getElementById('trends-grid').innerHTML = '<p style="color: #6B7280;">Trendy sa práve načítavajú...</p>';
      });

    function render() {
      const filtered = currentFilter === 'all' ? trends : trends.filter(t => t.niche === currentFilter);
      document.getElementById('count').textContent = `Zobrazujem ${filtered.length} trendov`;
      
      document.getElementById('trends-grid').innerHTML = filtered.map(t => `
        <div class="trend-card">
          <div class="trend-meta">
            <span class="tag tag-${t.niche.toLowerCase().replace(' brand', '-brand')}">${t.niche}</span>
            <span class="tag tag-hot">Trending</span>
            <span class="tag tag-platform">${t.platform || 'Instagram/TikTok'}</span>
          </div>
          <div class="trend-title">${t.title}</div>
          <div class="trend-desc">${t.description}</div>
          <div class="trend-insight"><strong>💡 Ako využiť:</strong> ${t.insight || t.actionable_insight || 'Sleduj a adaptuj do svojho obsahu.'}</div>
          <div class="trend-source">📅 ${t.date || '2026-06-10'} ${t.source ? '• Zdroj: ' + t.source : ''}</div>
        </div>
      `).join('');
    }

    document.getElementById('filters').addEventListener('click', function(e) {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      render();
    });
  </script>
</body>
</html>
